# nginx/themureed.conf
# Deploy to: /etc/nginx/sites-available/themureed
# Enable with: ln -s /etc/nginx/sites-available/themureed /etc/nginx/sites-enabled/themureed
#
# NOTE: After running certbot, it will add SSL directives automatically.
# Replace "yourdomain.com" with your actual domain before deploying.

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    root /var/www/themureed/public;
    index index.php;

    # SSL — managed by Certbot (added automatically after: certbot --nginx -d yourdomain.com)
    # ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Logging
    access_log /var/log/nginx/themureed-access.log;
    error_log  /var/log/nginx/themureed-error.log;

    # Max upload size for Spatie Media Library
    client_max_body_size 100M;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/xml image/svg+xml;
    gzip_vary on;
    gzip_min_length 1024;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Long-term cache for Vite-built assets (content-hashed filenames)
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Cache for storage symlink files (images, media)
    location /storage/ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location = /favicon.ico { log_not_found off; access_log off; }
    location = /robots.txt  { log_not_found off; access_log off; }

    # Block dotfiles (except .well-known for certbot)
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass            unix:/run/php/php8.5-fpm.sock;
        fastcgi_index           index.php;
        fastcgi_param           SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include                 fastcgi_params;
        fastcgi_read_timeout    300;
        fastcgi_buffer_size     16k;
        fastcgi_buffers         4 16k;
    }
}
